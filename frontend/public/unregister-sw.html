<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Unregister Service Workers</title>
    <style>body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:20px}button{padding:8px 12px;font-size:16px}</style>
  </head>
  <body>
    <h1>Unregister service workers (this origin)</h1>
    <p>Click the button below to unregister all service workers and clear caches for this origin/port.</p>
    <button id="run">Unregister & Clear Caches</button>
    <pre id="out"></pre>

    <script>
      async function run() {
        const out = document.getElementById('out');
        if (!('serviceWorker' in navigator)) {
          out.textContent = 'Service Worker API not available in this browser.';
          return;
        }
        try {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const r of regs) {
            try { await r.unregister(); } catch(e) { /* ignore */ }
          }
          const keys = await caches.keys();
          for (const k of keys) {
            try { await caches.delete(k); } catch(e) { /* ignore */ }
          }
          out.textContent = `Unregistered ${regs.length} registrations and cleared ${keys.length} caches. Reloading...`;
          setTimeout(()=>location.reload(true), 800);
        } catch (err) {
          out.textContent = 'Error: ' + err;
        }
      }
      document.getElementById('run').addEventListener('click', run);
    </script>
  </body>
</html>
